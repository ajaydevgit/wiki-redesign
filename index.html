<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Encyclopedia UI Concept</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Background blobs -->
    <div class="bg-blobs">
        <div class="blob pink"></div>
        <div class="blob blue"></div>
        <div class="blob purple"></div>
    </div>

    <!-- Main Card -->
    <div class="container glass">
        <h1>Encyclopedia</h1>
        <p class="subtitle">Knowledge, beautifully reimagined ✨</p>

        <input type="text" placeholder="Explore topics (UI only)">

        <div class="cards">
            <div class="card">🌍 English</div>
            <div class="card">🇪🇸 Español</div>
            <div class="card">🇩🇪 Deutsch</div>
            <div class="card">🇫🇷 Français</div>
            <div class="card">🇷🇺 Русский</div>
            <div class="card">🇯🇵 日本語</div>
        </div>

        <p class="disclaimer">
            This is an unofficial UI concept created for learning and portfolio use.<br>
            Not affiliated with Wikipedia or Wikimedia Foundation.
        </p>
    </div>

</body>
</html>
